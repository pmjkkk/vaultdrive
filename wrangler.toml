name = "vaultdrive"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "KV"
id = "a3e171a8d653447daed3f7064212fd5b"

# ── 明文配置（非敏感，可直接写在这里）──────────────────────────
[vars]

# 存储后端：telegram（默认）| s3 | webdav
storage = "telegram"

# S3 配置（storage=s3 时填写，以 Cloudflare R2 为例）
# s3_endpoint   = "https://<account-id>.r2.cloudflarestorage.com"
# s3_bucket     = "my-bucket"
# s3_region     = "auto"
# s3_public_url = "https://cdn.example.com"   # 可选，有则跳过 Worker 代理

# WebDAV 存储（storage=webdav 时填写）
# webdav_storage_url = "https://dav.example.com/remote.php/dav/files/user/"
# 支持：Nextcloud / 坚果云 / 群晖 WebDAV / Box / 任意标准 WebDAV 服务

# Session 有效期（秒）
session_ttl = "86400"

# 完全关闭认证（内网/信任环境）：改为 "true" 即可
auth_disabled = "false"


# ── 加密 Secrets（敏感信息，通过以下方式设置）──────────────────
#
#   方式一（CLI）：wrangler secret put <KEY>
#   方式二（界面）：Cloudflare Dashboard → Workers & Pages
#                  → vaultdrive → Settings → Variables → Secrets
#
# 必填（根据所选存储和认证方式）：
#
#   Telegram 存储 / 验证码登录（二者共用同一 Bot）：
#     telegram_bot_token     Bot Token（BotFather 获取）
#     telegram_chat_id       私有频道 Chat ID（如 -1001234567890）
#
#   S3 存储：
#     s3_access_key          Access Key ID
#     s3_secret_key          Secret Access Key
#
#   WebDAV 存储：
#     webdav_storage_user    远端 WebDAV 用户名
#     webdav_storage_pass    远端 WebDAV 密码
#
#   Web UI 密码登录：
#     login_pass             Web UI 登录密码
#
#   WebDAV 客户端访问本项目：
#     webdav_user            WebDAV 用户名
#     webdav_pass            WebDAV 密码（与 login_pass 完全独立）
